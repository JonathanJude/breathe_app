name: breathe_app
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.9.0-333.2.beta

dependencies:
  flutter:
    sdk: flutter

  equatable: ^2.0.8
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  go_router: ^17.0.0
  just_audio: ^0.10.5
  shared_preferences: ^2.5.3
  flutter_svg: ^2.2.3
  lottie: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  bloc_test: ^10.0.0
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  very_good_analysis: ^9.0.0
  build_runner: ^2.4.13
  flutter_gen_runner: ^5.7.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/background/
    - assets/icons/svg/
    - assets/audio/
    - assets/lottie/

  fonts:
    - family: Quicksand
      fonts:
        - asset: assets/fonts/Quicksand/Quicksand-Light.ttf
          weight: 300
        - asset: assets/fonts/Quicksand/Quicksand-Regular.ttf
          weight: 400
        - asset: assets/fonts/Quicksand/Quicksand-Medium.ttf
          weight: 500
        - asset: assets/fonts/Quicksand/Quicksand-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Quicksand/Quicksand-Bold.ttf
          weight: 700

flutter_gen:
  output: lib/gen/
  line_length: 100
  integrations:
    flutter_svg: true
    lottie: true
  colors:
    enabled: true
    inputs:
      - assets/colors/colors.xml
    outputs:
      class_name: AppColors
